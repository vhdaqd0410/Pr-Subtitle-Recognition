<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' http://127.0.0.1:8765; style-src 'self' 'unsafe-inline'; connect-src 'self' http://127.0.0.1:8765">
    <title>PR 字幕识别</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <main>
      <h1>PR 字幕识别</h1>
      <p class="hint">导出当前序列混音为 WAV，本地语音识别后自动生成字幕轨道。</p>
      <p id="sequence-name" class="filename">请先在 Premiere 中打开一个序列</p>
      <div class="fields">
        <label>语言<select id="language"><option value="auto">自动检测</option><option value="zh">中文</option><option value="en">英文</option><option value="ja">日文</option><option value="ko">韩文</option></select></label>
        <label>模型<select id="model"><option value="tiny">tiny（最快）</option><option value="base">base</option><option value="small" selected>small（推荐）</option><option value="medium">medium（较准）</option><option value="large-v3">large-v3（最准）</option></select></label>
      </div>
      <button id="transcribe">识别当前序列</button>
      <p id="status" role="status">请先启动本地服务。</p>
      <div class="progress" aria-label="识别进度"><div id="progress-bar"></div></div>
      <textarea id="result" aria-label="SRT 结果" placeholder="识别结果将显示在此处"></textarea>
      <button id="add-captions" disabled>按默认样式添加到当前序列</button>
    </main>
    <script src="js/CSInterface.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
