<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' http://127.0.0.1:8765; style-src 'self' 'unsafe-inline'; connect-src 'self' http://127.0.0.1:8765">
    <title>PR 字幕识别</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <main>
      <!-- Header -->
      <div class="header">
        <h1>PR 字幕识别</h1>
        <span id="version">v1.0</span>
        <span id="server-dot" class="dot off" title="服务状态"></span>
      </div>

      <!-- Sequence -->
      <div class="card">
        <p id="sequence-name">请先在 Premiere 中打开一个序列</p>
      </div>

      <!-- Settings -->
      <div class="card">
        <div class="row">
          <label>识别方式
            <select id="provider">
              <option value="local">本地模型</option>
              <option value="openai">在线 API</option>
            </select>
          </label>
          <label>导出范围
            <select id="range">
              <option value="all">全部时间轴</option>
              <option value="work">入点 - 出点</option>
              <option value="selected">选中片段</option>
            </select>
          </label>
        </div>
        <div class="row">
          <label>语言
            <select id="language">
              <option value="auto">自动检测</option>
              <option value="zh">中文</option>
              <option value="en">英文</option>
              <option value="ja">日文</option>
              <option value="ko">韩文</option>
            </select>
          </label>
          <label id="local-options">本地模型
            <select id="model">
              <option value="tiny">tiny</option>
              <option value="base">base</option>
              <option value="small" selected>small</option>
              <option value="medium">medium</option>
              <option value="large-v3">large-v3</option>
            </select>
          </label>
        </div>
        <div id="api-options" style="display:none">
          <label>API 地址 <input type="text" id="api-base" placeholder="https://api.openai.com/v1"></label>
          <label>API Key <input type="password" id="api-key" placeholder="sk-..."></label>
          <label>模型名 <input type="text" id="api-model" value="whisper-1"></label>
        </div>
      </div>

      <!-- Action -->
      <button id="transcribe" class="primary">🎤 开始识别</button>

      <!-- Progress -->
      <div id="progress-area" style="display:none">
        <div class="progress-bar">
          <div id="progress-fill"></div>
        </div>
        <p id="progress-text">0%</p>
      </div>

      <!-- Status -->
      <p id="status" role="status">请先启动本地服务，然后点击上方按钮。</p>

      <!-- Result -->
      <textarea id="result" placeholder="识别结果将显示在此处…&#10;&#10;也可直接粘贴 SRT 内容后导入。"></textarea>
      <div class="btn-row">
        <button id="add-captions" disabled>添加到当前序列</button>
        <button id="export-srt" class="secondary" disabled>导出 SRT 文件</button>
      </div>
    </main>
    <script src="js/CSInterface.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
